default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: bikebid_development
  username: postgres
  password: postgres
  host: localhost

test:
  <<: *default
  database: bikebid_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
